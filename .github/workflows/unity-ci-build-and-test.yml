name: Unity CI — Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}

jobs:
  test:
    name: EditMode Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: game-ci/unity-test-runner@v4
        id: tests
        with:
          testMode: EditMode
          unityVersion: auto
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: artifacts

  build:
    name: Build (WebGL)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: game-ci/unity-builder@v4
        with:
          targetPlatform: WebGL
          unityVersion: auto

      - uses: actions/upload-artifact@v4
        with:
          name: build-webgl
          path: build/WebGL
